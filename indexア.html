<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>アンケート入口</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700&display=swap');

    body {
      font-family: "Zen Maru Gothic", system-ui, sans-serif;
      background: #f4f0ff;
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 560px;
      margin: 60px auto;
      background: #fff;
      border-radius: 16px;
      padding: 28px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
      text-align: center;
    }

    h1 {
      font-size: 20px;
      margin-bottom: 8px;
      color: #5a4ebf;
    }

    p {
      font-size: 14px;
      color: #555;
      line-height: 1.6;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 14px;
      margin: 12px 0;
      border-radius: 12px;
      border: none;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      background: #7b6df0;
      color: white;
      transition: 0.2s;
    }

    .btn:hover {
      background: #6a5ae0;
    }

    .note {
      font-size: 12px;
      margin-top: 18px;
      color: #666;
      line-height: 1.6;
    }

    .hidden {
      display: none;
    }

  </style>
</head>

<body>

<div class="container">

  <h1>アンケート入口ページ</h1>
  <p id="description">
    医院を選択してください。
  </p>

  <div id="clinicList">
    <!-- ここに医院ボタンが自動生成されます -->
  </div>

  <div class="note">
    ※リンクが開かない場合は、右上「…」→「外部ブラウザで開く」をお試しください。<br>
    ※投稿は任意です。内容は必ずご自身でご確認・修正してください。
  </div>

</div>

<script>

  /*
    ===============================
    医院コード → GAS URL をここで管理
    将来増えたらここに追加するだけ
    ===============================
  */

  const MAP = {
    yono: {
      name: "パール歯科医院 与野",
      url: "https://script.google.com/macros/s/AKfycbzfnOxxHvcAa3Vbm4RNP_MD4C43LrMJFhX1Q8plf1FzsiwCGl9RINhrVuVCuMT7bm9rmA/exec?src=entry&v=1"
    },

    clinicB: {
      name: "◯◯歯科（サンプル）",
      url: "https://script.google.com/macros/s/XXXX/exec?src=entry&v=1"
    }

  };

  /*
    ===============================
    自動振り分け（B）
    ===============================
  */

  const params = new URLSearchParams(window.location.search);
  const clinicCode = params.get("c");

  if (clinicCode && MAP[clinicCode]) {
    // 0.8秒だけ表示してから遷移（UX向上）
    document.getElementById("description").innerText =
      MAP[clinicCode].name + " のアンケートへ移動します...";

    setTimeout(() => {
      window.location.href = MAP[clinicCode].url;
    }, 800);

  } else {

    /*
      ===============================
      一覧表示（A）
      ===============================
    */

    const listDiv = document.getElementById("clinicList");

    Object.keys(MAP).forEach(key => {
      const btn = document.createElement("button");
      btn.className = "btn";
      btn.innerText = MAP[key].name;
      btn.onclick = () => {
        window.location.href = MAP[key].url;
      };
      listDiv.appendChild(btn);
    });

  }

</script>

</body>
</html>
