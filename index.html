<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>アンケート入口</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700&display=swap');
    body{font-family:"Zen Maru Gothic",system-ui,sans-serif;background:#f4f0ff;margin:0;padding:20px}
    .container{max-width:560px;margin:60px auto;background:#fff;border-radius:16px;padding:26px;box-shadow:0 10px 25px rgba(0,0,0,.05);text-align:center}
    h1{font-size:20px;margin:0 0 8px;color:#5a4ebf}
    p{font-size:14px;color:#555;line-height:1.6;margin:10px 0}
    .btn{display:block;width:100%;padding:14px;margin:12px 0;border-radius:12px;border:none;font-size:15px;font-weight:700;cursor:pointer;background:#7b6df0;color:#fff;transition:.2s}
    .btn:hover{background:#6a5ae0}
    .btn-secondary{background:#1e66ff}
    .btn-secondary:hover{background:#1958db}
    .note{font-size:12px;margin-top:16px;color:#666;line-height:1.6;text-align:left;background:#faf8ff;border:1px solid #eee7ff;border-radius:12px;padding:12px}
    .small{font-size:12px;color:#666;line-height:1.6;text-align:left;margin-top:10px}
    code{font-family:ui-monospace, SFMono-Regular, Menlo, monospace;font-size:12px}
  </style>
</head>
<body>
<div class="container">
  <h1>アンケート入口ページ</h1>
  <p id="description">医院を選択してください。</p>

  <div id="panel"></div>

  <div class="note">
    <b>開けない場合：</b><br>
    ・LINE内ブラウザでは開けないことがあります。右上「…」→「外部ブラウザで開く」をお試しください。<br>
    ・それでもダメなら、下に表示されるURLをコピーしてChrome/Safariで開いてください。
  </div>

  <div class="small">
    ※投稿は任意です。内容は必ずご自身でご確認・修正してください。
  </div>
</div>

<script>
  // ここに医院を追加していく（将来増えてもここだけ）
  const MAP = {
    yono: {
      name: "パール歯科医院 与野",
      url: "https://script.google.com/macros/s/AKfycbzfnOxxHvcAa3Vbm4RNP_MD4C43LrMJFhX1Q8plf1FzsiwCGl9RINhrVuVCuMT7bm9rmA/exec?src=entry"
    },
    // clinicB: { name:"◯◯歯科", url:"https://script.google.com/macros/s/XXXX/exec?src=entry" }
  };

  // キャッシュ回避用のダミー（毎日変えてもOK）
  function withDummy(url){
    const v = new Date().toISOString().slice(0,10).replaceAll("-",""); // YYYYMMDD
    return url.includes("?") ? `${url}&v=${v}` : `${url}?v=${v}`;
  }

  function openInNewTab(url){
    const u = withDummy(url);
    // LINE/WebView対策：window.openの方が安定しやすい
    const w = window.open(u, "_blank", "noopener,noreferrer");
    // ブロックされる環境向けフォールバック
    if (!w) location.href = u;
  }

  function renderList(){
    const panel = document.getElementById("panel");
    panel.innerHTML = "";
    Object.keys(MAP).forEach(key => {
      const btn = document.createElement("button");
      btn.className = "btn";
      btn.textContent = MAP[key].name;
      btn.onclick = () => renderClinic(key);
      panel.appendChild(btn);
    });
  }

  function renderClinic(key){
    const clinic = MAP[key];
    const panel = document.getElementById("panel");
    document.getElementById("description").innerText =
      `${clinic.name} のアンケートを開きます。`;

    const finalUrl = withDummy(clinic.url);

    panel.innerHTML = `
      <button class="btn btn-secondary" type="button" id="goBtn">アンケートを開く（外部ブラウザ推奨）</button>
      <div class="small">
        うまく開けない場合は、下のURLをコピーしてブラウザで開いてください：<br>
        <code id="u">${finalUrl}</code>
      </div>
      <button class="btn" type="button" id="backBtn">医院一覧に戻る</button>
    `;

    document.getElementById("goBtn").onclick = () => openInNewTab(clinic.url);
    document.getElementById("backBtn").onclick = () => {
      document.getElementById("description").innerText = "医院を選択してください。";
      renderList();
    };
  }

  // A+Bハイブリッド：cがあればその医院画面を出す（ただし自動遷移しない）
  const params = new URLSearchParams(location.search);
  const c = params.get("c");
  if (c && MAP[c]) {
    renderClinic(c);
  } else {
    renderList();
  }
</script>
</body>
</html>
